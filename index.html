<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🏁 Agile Hunter - Oscar & Yesica</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-card: rgba(255,255,255,0.9);
            --text: #1a1a2e;
            --text-secondary: #555;
            --border: rgba(0,0,0,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --accent: #00a859;
            --accent-glow: rgba(0,168,89,0.3);
            --gold: #f0b90b;
            --gold-glow: rgba(240,185,11,0.4);
            --input-bg: rgba(0,0,0,0.05);
            --toast-bg: #1a1a2e;
            --toast-text: white;
            --modal-overlay: rgba(0,0,0,0.6);
            --gradient: linear-gradient(135deg, #00a859, #2ecc71);
            --btn-text: white;
            --card-yesica: #e8f5e9;
            --card-oscar: #e3f2fd;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --bg-card: rgba(22,27,34,0.95);
                --text: #e6edf3;
                --text-secondary: #8b949e;
                --border: rgba(255,255,255,0.08);
                --shadow: 0 8px 32px rgba(0,0,0,0.3);
                --accent: #2ecc71;
                --accent-glow: rgba(46,204,113,0.4);
                --gold: #f0b90b;
                --gold-glow: rgba(240,185,11,0.5);
                --input-bg: rgba(255,255,255,0.08);
                --toast-bg: #e6edf3;
                --toast-text: #0d1117;
                --modal-overlay: rgba(0,0,0,0.8);
                --gradient: linear-gradient(135deg, #2ecc71, #00a859);
                --card-yesica: rgba(46,204,113,0.1);
                --card-oscar: rgba(52,152,219,0.1);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background 0.5s ease, color 0.5s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, var(--accent-glow) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, var(--gold-glow) 0%, transparent 50%);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #2ecc71;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h2 {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .login-screen {
            text-align: center;
        }

        .login-screen p {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            color: var(--btn-text);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:active::after { opacity: 1; }

        .btn-primary {
            background: var(--gradient);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover { background: var(--input-bg); }

        .btn-small {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            width: auto;
        }

        .scoreboard {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .player-card {
            flex: 1;
            border-radius: 16px;
            padding: 1.2rem 1rem;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card.yesica {
            background: var(--card-yesica);
        }

        .player-card.oscar {
            background: var(--card-oscar);
        }

        .player-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.03);
        }

        .player-card .player-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }

        .player-card .player-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .player-card .player-score {
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
        }

        .player-card .player-score.pop {
            animation: scorePop 0.5s ease;
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .player-card .player-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin: 1.5rem 0 0.5rem;
            text-align: center;
        }

        .patent-list {
            max-height: 350px;
            overflow-y: auto;
            border-radius: 12px;
            background: var(--input-bg);
            padding: 0.5rem;
        }

        .patent-list:empty::after {
            content: '📭 Ningún Agile registrado aún... ¡A buscar!';
            display: block;
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .patent-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            background: var(--bg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .patent-item .patent-plate {
            background: var(--gradient);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            min-width: 75px;
            text-align: center;
        }

        .patent-item .patent-details {
            flex: 1;
            font-size: 0.85rem;
        }

        .patent-item .patent-details small {
            color: var(--text-secondary);
            font-size: 0.75rem;
            display: block;
        }

        .patent-item .patent-points {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--modal-overlay);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .plate-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1.2rem;
            background: var(--input-bg);
            color: var(--text);
            letter-spacing: 3px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .plate-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            z-index: 200;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: bottom 0.3s ease;
            text-align: center;
            max-width: 90%;
            white-space: nowrap;
        }

        .toast.show {
            bottom: 30px;
        }

        /* Confeti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 300;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .winner-banner {
            background: var(--gradient);
            color: white;
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-weight: 600;
            animation: slideIn 0.5s ease;
        }

        @media (max-width: 400px) {
            .container {
                padding: 1.5rem 1rem;
                border-radius: 20px;
            }
            h1 { font-size: 1.5rem; }
            .player-card .player-score { font-size: 2.5rem; }
            .patent-item .patent-plate { font-size: 0.8rem; min-width: 65px; }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <!-- Pantalla de Login -->
        <div id="login-screen" class="login-screen">
            <h1>🏁 Agile Hunter</h1>
            <h2>El juego de cazar Chevrolet Agile</h2>
            <p>¿Quién está jugando ahora?</p>
            <div class="login-buttons">
                <button class="btn btn-primary" onclick="seleccionarJugador('Yesica')">
                    <span>👩</span> Soy Yesica
                </button>
                <button class="btn btn-primary" onclick="seleccionarJugador('Oscar')">
                    <span>👨</span> Soy Oscar
                </button>
            </div>
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:1rem;">
                📱 Se guardará en tu teléfono
            </p>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen" style="display:none;">
            <div class="header">
                <h1>🏁 Agile Hunter</h1>
                <div class="connection-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Conectando...</span>
                    <button class="btn btn-outline btn-small" onclick="cambiarJugador()" title="Cambiar jugador">🔄</button>
                </div>
            </div>
            <h2 id="semana-label">Cargando...</h2>

            <div class="scoreboard">
                <div class="player-card yesica" id="card-yesica">
                    <div class="player-emoji">👩</div>
                    <div class="player-name">Yesica</div>
                    <div class="player-score" id="score-yesica">0</div>
                    <div class="player-subtitle">Agiles cazados</div>
                </div>
                <div class="player-card oscar" id="card-oscar">
                    <div class="player-emoji">👨</div>
                    <div class="player-name">Oscar</div>
                    <div class="player-score" id="score-oscar">0</div>
                    <div class="player-subtitle">Agiles cazados</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="abrirModalPatente()">
                    <span>➕</span> ¡Anotar Agile!
                </button>
                <button class="btn btn-outline" onclick="descargarExcel()">
                    <span>📥</span> Descargar Excel
                </button>
            </div>

            <div id="winner-banner" style="display:none;"></div>

            <div class="section-title">📋 Últimos Agiles cazados</div>
            <div class="patent-list" id="patent-list"></div>
        </div>
    </div>

    <!-- Modal para cargar patente -->
    <div class="modal-overlay" id="modal-patente" style="display:none;">
        <div class="modal">
            <h3>🚗 ¡Agile avistado!</h3>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:1rem;font-size:0.9rem;">
                Jugador: <strong id="modal-jugador"></strong>
            </p>
            
            <div class="input-group">
                <label>Patente del vehículo</label>
                <input type="text" class="plate-input" id="input-patente" 
                       placeholder="AB123CD" maxlength="7"
                       autocomplete="off" spellcheck="false">
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="cerrarModal()">
                    ❌ Cancelar
                </button>
                <button class="btn btn-primary" onclick="guardarPatente()">
                    <span>✅</span> Confirmar Agile
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Canvas para confeti -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const API_URL = 'https://script.google.com/macros/s/TU_ID_ACA/exec';
        const REFRESH_INTERVAL = 5000;

        // ==================== ESTADO ====================
        let jugadorActual = localStorage.getItem('agile_hunter_player') || null;
        let ultimoPuntajeYesica = 0;
        let ultimoPuntajeOscar = 0;
        let refreshIntervalId = null;

        // ==================== INICIALIZACIÓN ====================
        window.addEventListener('DOMContentLoaded', async () => {
            solicitarPermisoNotificaciones();
            
            if (jugadorActual) {
                mostrarPantallaJuego();
                await inicializarDatos();
                iniciarActualizacionPeriodica();
            } else {
                mostrarPantallaLogin();
            }
        });

        async function inicializarDatos() {
            await actualizarUI();
            const puntajes = await obtenerPuntajesActuales();
            ultimoPuntajeYesica = puntajes.yesica;
            ultimoPuntajeOscar = puntajes.oscar;
            setTimeout(mostrarGanadorSemanaAnterior, 1500);
        }

        function iniciarActualizacionPeriodica() {
            if (refreshIntervalId) clearInterval(refreshIntervalId);
            refreshIntervalId = setInterval(verificarCambios, REFRESH_INTERVAL);
        }

        async function verificarCambios() {
            try {
                const puntajes = await obtenerPuntajesActuales();
                
                if (jugadorActual === 'Oscar' && puntajes.yesica > ultimoPuntajeYesica) {
                    const diferencia = puntajes.yesica - ultimoPuntajeYesica;
                    notificarPuntos('Yesica', diferencia);
                    mostrarToast(`📲 ¡Yesica cazó un Agile! +1 punto`);
                }
                
                if (jugadorActual === 'Yesica' && puntajes.oscar > ultimoPuntajeOscar) {
                    const diferencia = puntajes.oscar - ultimoPuntajeOscar;
                    notificarPuntos('Oscar', diferencia);
                    mostrarToast(`📲 ¡Oscar cazó un Agile! +1 punto`);
                }
                
                ultimoPuntajeYesica = puntajes.yesica;
                ultimoPuntajeOscar = puntajes.oscar;
                
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').textContent = 'En línea';
                await actualizarUI();
            } catch (error) {
                document.getElementById('status-dot').classList.remove('online');
                document.getElementById('status-text').textContent = 'Sin conexión';
            }
        }

        // ==================== NOTIFICACIONES ====================
        async function solicitarPermisoNotificaciones() {
            if (!('Notification' in window)) return;
            
            if (Notification.permission === 'granted') return;
            
            if (Notification.permission !== 'denied') {
                const permiso = await Notification.requestPermission();
                if (permiso === 'granted') {
                    mostrarToast('🔔 ¡Notificaciones activadas!');
                }
            }
        }

        function notificarPuntos(jugador, puntos) {
            if (!('Notification' in window)) return;
            
            if (Notification.permission === 'granted') {
                const emoji = jugador === 'Yesica' ? '👩' : '👨';
                const notificacion = new Notification(`🚗 ¡${jugador} cazó un Agile!`, {
                    body: `${emoji} ${jugador} sumó +${puntos} punto${puntos > 1 ? 's' : ''} 🏁`,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🚗</text></svg>',
                    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏁</text></svg>',
                    tag: 'agile-hunter',
                    vibrate: [200, 100, 200],
                    requireInteraction: false
                });
                
                setTimeout(() => notificacion.close(), 5000);
                
                notificacion.onclick = () => {
                    window.focus();
                    notificacion.close();
                };
            }
        }

        // ==================== NAVEGACIÓN ====================
        function mostrarPantallaLogin() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
        }

        function mostrarPantallaJuego() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('semana-label').textContent = obtenerRangoSemana();
        }

        function seleccionarJugador(nombre) {
            jugadorActual = nombre;
            localStorage.setItem('agile_hunter_player', nombre);
            mostrarToast(`👋 ¡Hola ${nombre}! A cazar Agiles 🚗`);
            mostrarPantallaJuego();
            inicializarDatos().then(() => iniciarActualizacionPeriodica());
        }

        function cambiarJugador() {
            if (confirm('¿Querés cambiar de jugador? Volverás a la pantalla de selección.')) {
                if (refreshIntervalId) clearInterval(refreshIntervalId);
                localStorage.removeItem('agile_hunter_player');
                jugadorActual = null;
                mostrarPantallaLogin();
            }
        }

        // ==================== MODAL DE PATENTE ====================
        function abrirModalPatente() {
            document.getElementById('input-patente').value = '';
            document.getElementById('modal-jugador').textContent = jugadorActual;
            document.getElementById('modal-patente').style.display = 'flex';
            setTimeout(() => document.getElementById('input-patente').focus(), 100);
        }

        function cerrarModal() {
            document.getElementById('modal-patente').style.display = 'none';
        }

        // ==================== CONEXIÓN CON GOOGLE SHEETS ====================
        async function guardarPatente() {
            const input = document.getElementById('input-patente');
            const patente = input.value.trim().toUpperCase();
            
            if (!patente || patente.length < 6) {
                mostrarToast('⚠️ Ingresá una patente válida (6 o 7 caracteres)');
                input.focus();
                return;
            }

            try {
                mostrarToast('⏳ Verificando patente...');
                
                const verificacion = await fetch(
                    `${API_URL}?action=verificar&patente=${encodeURIComponent(patente)}`
                );
                const dataVerificacion = await verificacion.json();
                
                if (!dataVerificacion.ok) {
                    mostrarToast(dataVerificacion.mensaje);
                    input.focus();
                    return;
                }
                
                mostrarToast('⏳ Registrando Agile...');
                const url = `${API_URL}?action=guardar&patente=${encodeURIComponent(patente)}&jugador=${encodeURIComponent(jugadorActual)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok) {
                    lanzarConfetti();
                    mostrarToast(`🎉 ¡AGILE CAZADO! Patente ${patente} registrada 🚗`);
                    
                    cerrarModal();
                    await actualizarUI();
                    
                    setTimeout(verificarCambios, 1000);
                } else {
                    mostrarToast(data.mensaje || '❌ Error al guardar');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarToast('❌ Error de conexión. ¿Tienes internet?');
            }
        }

        async function obtenerPuntajesActuales() {
            try {
                const semanaActual = obtenerSemanaISO();
                const url = `${API_URL}?action=puntajes&semana=${semanaActual}`;
                const response = await fetch(url);
                const data = await response.json();
                
                return {
                    yesica: data.datos?.Yesica || 0,
                    oscar: data.datos?.Oscar || 0,
                    ganador: data.datos?.ganador || 'Empate',
                    totalPatentes: data.datos?.totalPatentes || 0
                };
            } catch (error) {
                return { yesica: ultimoPuntajeYesica, oscar: ultimoPuntajeOscar, ganador: 'Error', totalPatentes: 0 };
            }
        }

        async function actualizarUI() {
            try {
                const puntajes = await obtenerPuntajesActuales();
                const scoreYesica = document.getElementById('score-yesica');
                const scoreOscar = document.getElementById('score-oscar');
                
                if (parseInt(scoreYesica.textContent) !== puntajes.yesica) {
                    scoreYesica.classList.add('pop');
                    setTimeout(() => scoreYesica.classList.remove('pop'), 500);
                }
                if (parseInt(scoreOscar.textContent) !== puntajes.oscar) {
                    scoreOscar.classList.add('pop');
                    setTimeout(() => scoreOscar.classList.remove('pop'), 500);
                }
                
                scoreYesica.textContent = puntajes.yesica;
                scoreOscar.textContent = puntajes.oscar;
                
                document.getElementById('card-yesica').classList.toggle('active', jugadorActual === 'Yesica');
                document.getElementById('card-oscar').classList.toggle('active', jugadorActual === 'Oscar');
                
                const urlPatentes = `${API_URL}?action=consultar`;
                const responsePatentes = await fetch(urlPatentes);
                const dataPatentes = await responsePatentes.json();
                
                if (dataPatentes.ok) {
                    const recientes = dataPatentes.datos.slice(0, 20);
                    const lista = document.getElementById('patent-list');
                    lista.innerHTML = recientes.map(p => `
                        <div class="patent-item">
                            <span class="patent-plate">${p.patente}</span>
                            <div class="patent-details">
                                <div>Cazado por: <strong>${p.jugador}</strong></div>
                                <small>${p.fecha} a las ${p.hora}</small>
                            </div>
                            <span class="patent-points">+1</span>
                        </div>
                    `).join('');
                }
                
            } catch (error) {
                console.error('Error actualizando UI:', error);
            }
        }

        async function mostrarGanadorSemanaAnterior() {
            try {
                const semanaActual = obtenerSemanaISO();
                const semanaPasada = semanaActual - 1;
                
                const url = `${API_URL}?action=puntajes&semana=${semanaPasada}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.datos.totalPatentes > 0) {
                    const d = data.datos;
                    let mensaje = '';
                    if (d.Yesica > d.Oscar) {
                        mensaje = `🏆 ¡Yesica ganó la semana pasada! ${d.Yesica} vs ${d.Oscar} Agiles`;
                    } else if (d.Oscar > d.Yesica) {
                        mensaje = `🏆 ¡Oscar ganó la semana pasada! ${d.Oscar} vs ${d.Yesica} Agiles`;
                    } else {
                        mensaje = `🤝 ¡Empate la semana pasada! ${d.Yesica} Agiles cada uno`;
                    }
                    
                    const banner = document.getElementById('winner-banner');
                    banner.textContent = mensaje;
                    banner.style.display = 'block';
                    setTimeout(() => {
                        banner.style.display = 'none';
                    }, 8000);
                    
                    mostrarToast(mensaje);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function descargarExcel() {
            try {
                mostrarToast('⏳ Preparando Excel...');
                const url = `${API_URL}?action=consultar`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.ok || data.datos.length === 0) {
                    mostrarToast('📭 No hay Agiles para descargar');
                    return;
                }
                
                let csv = 'Fecha,Hora,Patente,Jugador,Semana\n';
                data.datos.reverse().forEach(p => {
                    csv += `${p.fecha},${p.hora},${p.patente},${p.jugador},${p.semana}\n`;
                });
                
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const urlBlob = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlBlob;
                a.download = `agiles_cazados_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(urlBlob);
                mostrarToast('📥 ¡Excel descargado!');
            } catch (error) {
                mostrarToast('❌ Error al descargar');
            }
        }

        // ==================== CÁLCULOS ====================
        function obtenerSemanaISO() {
            const ahora = new Date();
            const inicioAnio = new Date(ahora.getFullYear(), 0, 1);
            const dias = Math.floor((ahora - inicioAnio) / (24 * 60 * 60 * 1000));
            return Math.ceil((dias + inicioAnio.getDay() + 1) / 7);
        }

        function obtenerRangoSemana() {
            const ahora = new Date();
            const dia = ahora.getDay();
            const lunes = new Date(ahora);
            lunes.setDate(ahora.getDate() - dia + (dia === 0 ? -6 : 1));
            const domingo = new Date(lunes);
            domingo.setDate(lunes.getDate() + 6);
            
            const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
            return `Semana: ${lunes.getDate()} ${meses[lunes.getMonth()]} → ${domingo.getDate()} ${meses[domingo.getMonth()]}`;
        }

        // ==================== TOAST ====================
        let toastTimeout;
        function mostrarToast(mensaje) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== CONFETI ====================
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particulas = [];
        let animacionId = null;

        function lanzarConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particulas = [];
            
            const colores = ['#00a859','#2ecc71','#27ae60','#1abc9c','#f0b90b','#ffd700','#e5a600'];
            
            for (let i = 0; i < 150; i++) {
                particulas.push({
                    x: Math.random() * canvas.width,
                    y: -20 - Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 4 + 2,
                    color: colores[Math.floor(Math.random() * colores.length)],
                    size: Math.random() * 10 + 4,
                    rotacion: Math.random() * 360,
                    rotVel: (Math.random() - 0.5) * 15
                });
            }

            if (animacionId) cancelAnimationFrame(animacionId);
            animarConfetti();
        }

        function animarConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let todasCayeron = true;
            particulas.forEach(p => {
                p.y += p.vy;
                p.x += p.vx;
                p.vy += 0.08;
                p.rotacion += p.rotVel;
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotacion * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.9;
                ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
                ctx.restore();
                
                if (p.y < canvas.height + 50) {
                    todasCayeron = false;
                }
            });

            if (!todasCayeron) {
                animacionId = requestAnimationFrame(animarConfetti);
            }
        }

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(() => console.log('Service Worker registrado'))
                    .catch(() => console.log('Service Worker falló'));
            });
        }
    </script>
